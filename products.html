<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Product Page</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/Assets/CSS/products.css">
</head>

<body>
    <div class="container">
        <h1 class="mb-4"><a href="index.html" class="back-button">Back to Homepage</a></h1>
        <div id="product-list" class="row">
            <!-- Product cards will be dynamically added here -->
        </div>
    </div>

    <footer id="footer">
        <div class="container">
            <hr class="horizontal-line">
            <div class="footer-bottom-data">
                <span class="copyright-information">Copyright &copy;2024. All Rights Reserved.</span>
                <div class="legal-information">
                    <span class="copyright-information">Supermarket Grocery Supplies</span>
                    <span class="copyright-information">Pvt Ltd<span>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="/Assets/JScripts/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const productList = document.getElementById('product-list');
            for (const product of products) {
                const card = document.createElement('div');
                card.classList.add('col-lg-3', 'col-md-4', 'col-sm-6', 'mb-4'); // Adjusted column classes

                card.innerHTML = `
                    <div class="card h-100"> <!-- Ensure cards are of equal height -->
                        <img src="${product.image}" class="card-img-top" alt="${product.name}">
                        <div class="card-body"> <!-- Use flexbox for vertical alignment -->
                            <h5 class="card-title">${product.name}</h5>
                            <p class="card-text">${product.description}</p>
                            <p class="card-text font-weight-bold">Rs ${product.price.toFixed(2)}</p>
                            <a href="#" class="btn btn-primary">Add to Cart</a>
                        </div>
                    </div>
                `;
                productList.appendChild(card);
            }
        });
    </script>
</body>

</html>
